; Star Glory MMO server config template.
; Copy this file to server.cfg and fill local-only secrets before running the server.

[server]

; UDP/ENet listen port.
port=9000

; Maximum concurrent online players.
max_players=64

; Account/save directory. Empty = Godot user://data.
; Absolute paths are also accepted, for example:
; data_dir="/srv/starglory/data"
; data_dir="C:/starglory/data"
data_dir=""

; Fixed highest GM account.
; The server restores this account's GM level on every start.
; Set a password locally if you want the server to auto-create/reset this account.
super_admin_user="huaqadmin"
super_admin_password=""
super_admin_level=3

; Headless HTTP admin API.
admin_api_port=9080
admin_api_bind="127.0.0.1"
admin_api_token=""
